# Serve this node's HDT with comunica on {{ endpoint_port }}, detached in a named
# screen (named so we can stop it cleanly -- never pkill -f a pattern that matches
# the launcher). Then wait for the port and verify it answers ASK.
- name: Stop any existing endpoint screen
  ansible.builtin.command: screen -S endpoint -X quit
  changed_when: false
  failed_when: false

- name: Serve this endpoint's HDT with comunica (detached)
  ansible.builtin.shell:
    cmd: >
      screen -dmS endpoint comunica-sparql-hdt-http
      hdt@{{ endpoint_data_dir }}/{{ inventory_hostname }}.hdt
      -p {{ endpoint_port }} -t 1800 --lenient
  environment:
    NODE_OPTIONS: "--max-old-space-size={{ endpoint_node_heap_mb | default(4096) }}"

- name: Wait for the endpoint to listen
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ endpoint_port }}"
    timeout: 120

- name: Verify it answers ASK
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ endpoint_port }}/sparql?query=ASK%7B%3Fs%20%3Fp%20%3Fo%7D"
    headers:
      Accept: application/sparql-results+json
    return_content: true
  register: ask
  failed_when: "'true' not in ask.content"
