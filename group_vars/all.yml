---
# =============================================================================
# All tunable settings for the benchmark_infrastructure playbook live here.
# Task files under tasks/ reference these variables only -- no literals.
#
# The Virtual Wall *connection* settings (bastion/user/PEM) below are documented
# here; the actual per-host addresses and the SSH connection string live in
# inventory.yml, because Ansible reads the inventory *before* group_vars and
# therefore cannot template the connection string from here. See
# inventory.yml.example for the mapping.
# =============================================================================

# --- Virtual Wall connection (mirror these in inventory.yml) -----------------
wall_bastion_host: bastion.ilabt.imec.be
wall_bastion_user: fffbrtamuge
wall_ssh_user: brtamuge
wall_pem_file: ~/.ssh/ilabt.pem

# --- Testbed provisioning ----------------------------------------------------
# Base URL that serves the imec Virtual Wall helper scripts.
wall_scripts_base: https://www.wall2.ilabt.iminds.be
# Enlarge the root partition to fill the physical disk(s) (reboots the node).
expand_root_disk: true
# Enable outbound IPv4 via NAT (IPv6 is on by default but GitHub/DockerHub/npm
# are effectively IPv4-only). Re-applied every run -- it is not reboot-persistent.
enable_nat: true

# --- Experiment (cloned + yarn-installed, then left ready for you to run) -----
experiment_repo: git@github.com:shape-federated-queries/ask-count-fedx-large-rdf-bench.git
experiment_version: main
experiment_dest: "{{ ansible_env.HOME }}/experiment"

# --- Endpoints ---------------------------------------------------------------
endpoint_data_dir: "{{ ansible_env.HOME }}/data"
endpoint_comunica_pkg: "@comunica/query-sparql-hdt"
endpoint_node_heap_mb: 18432
endpoint_engine: comunica
# comunica endpoint supervisor (serve_comunica.sh): startup wait, health-check
# interval, and consecutive failures before a hung endpoint is killed + restarted.
endpoint_startup_max: 300
endpoint_check_interval: 20
endpoint_fail_limit: 3

# --- QLever ------------------------------------------------------------------
qlever_image: adfreiburg/qlever
qlever_container_name: qlever-endpoint
qlever_memory_max: "16G"
qlever_cache_max: "4G"
qlever_cache_entries: 0
qlever_index_memory: "16G"
qlever_query_timeout: "1800s"
endpoint_rdf_dir: "{{ experiment_dest }}/data/benchmark/datasets"
qlever_rdf_patterns:
  - "{{ inventory_hostname }}.nt"
  - "{{ inventory_hostname }}.ttl"
  - "{{ inventory_hostname }}.nq"

# --- Toolchain ---------------------------------------------------------------
nodejs_major: "22"
yarn_version: "1.22.22"
go_version: "1.23.4"
# Rust + sophia-cli (sop). Required: `make pipeline` runs validate-clean-dataset
# which invokes `sop`. Only set false if you trim those targets out.
install_sop: true
